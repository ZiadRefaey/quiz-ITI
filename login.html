<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style.css">
    <link type="image/png" sizes="96x96" rel="icon" href="assets/icons8-login-nolan-96.png">
</head>
<body class="sign-body">
    <form action="">
        <h2>Log in</h2>
        <h4>to start the quiz</h4>
        <label for="email">E-mail</label>
        <input type="text" placeholder="enter your e-mail" name="email" id="email">
                <span id="emailErr"></span>
        <label for="pass">password :</label>
        <input type="password" placeholder="enter a password" name="pass" id="pass">
                <span id="passErr"></span>

        <div class="checkboxDiv">
            <span>
                <input type="checkbox" name="remember" id="remember">
                <label for="remember">Remember me</label>
            </span>
            <a href="#">Forget password ?</a>
        </div>
        <button>Log in</button>
        <p>Don't have an account ? <a href="index.html">Sing up</a></p>
    </form>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js" integrity="sha256-/H4YS+7aYb9kJ5OKhFYPUjSJdrtV6AeyJOtTkw6X72o=" crossorigin="anonymous"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
