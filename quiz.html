<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/all.css" />
    <link rel="stylesheet" href="css/quiz.css" />
    <title>Document</title>
  </head>
  <body class="quiz-container">
    <nav class="navbar">
      <div class="logo"><img src="assets/logo.png" alt="logo icon" /></div>

      <div class="avatar hidden" id="avatarSection">
        <button id="avatarBtn" class="avatar-btn">A</button>

        <div class="dropdown-menu" id="dropdownMenu">
          <p class="username">USER NAME</p>
          <button class="signout">Sign Out</button>
        </div>
      </div>

      <div class="btns-nav hidden" id="authBtns">
        <a href="index.html" class="btn-signup">Sign Up</a>
        <a href="login.html" class="btn-signin">Sign In</a>
      </div>
    </nav>
    <header class="quiz-header">
      <p>
        <span class="current-question"
          >Question <span class="current-question-index">3</span></span
        >
        of <span class="total-questions-count">20</span>
      </p>
      <span class="timer"></span>

      <progress
        aria-label="remaining-time-progress-bar"
        class="progress-bar timer-progress"
      ></progress>
    </header>
    <aside class="questions-list-container aside-list-container">
      <p class="questions-list-title aside-title">Questions</p>
      <div class="questions-list aside-list"></div>
    </aside>
    <main class="questions-container">
      <h1 class="question-title"></h1>
      <div class="options-list"></div>
    </main>
    <aside class="marked-list-container aside-container">
      <p class="marked-list-title aside-title">Marked for Review</p>
      <div class="marked-questions-list aside-list"></div>
    </aside>
    <footer class="quiz-controls">
      <button disabled class="prev-btn">Previous</button>
      <button class="mark-btn">Mark</button>
      <button class="next-btn">Next</button>
      <button disabled class="submit-btn">Submit</button>
    </footer>
    <script type="module" src="/js/Quiz/main.js"></script>
    <script src="./js/navbar.js"></script>
  </body>
</html>
